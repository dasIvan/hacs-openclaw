# OpenClaw Status Card
# Requires: custom:button-card (HACS → Frontend)
#
# ──────────────────────────────────────────────
#  SETUP: Trage hier deine Entity-IDs ein
# ──────────────────────────────────────────────
# Die IDs findest du unter:
#   Einstellungen → Geräte & Dienste → OpenClaw → Entitäten

type: custom:button-card
entity: sensor.openclaw_status   # ← ANPASSEN

variables:
  entity_model: sensor.openclaw_modell              # ← ANPASSEN
  entity_last_active: sensor.openclaw_zuletzt_aktiv # ← ANPASSEN
  entity_connected: binary_sensor.openclaw_verbunden # ← ANPASSEN
  agent_name: OpenClaw                              # ← Dein Agent-Name
  agent_emoji: "🦞"                                 # ← Emoji für den Bot

show_name: false
show_label: false
show_state: false
show_icon: false

custom_fields:
  card_content: |
    [[[
      const status = entity?.state ?? 'idle';
      const busy = status === 'busy';
      const connected = states[variables.entity_connected]?.state === 'on';
      const model = states[variables.entity_model]?.state ?? '—';

      // Relative Zeit
      const raw = states[variables.entity_last_active]?.state;
      let timeLabel = '—';
      if (raw && raw !== 'unavailable' && raw !== 'unknown') {
        const diffMin = Math.round((Date.now() - new Date(raw)) / 60000);
        if (diffMin < 1) timeLabel = 'Gerade eben';
        else if (diffMin < 60) timeLabel = `vor ${diffMin} Min.`;
        else if (diffMin < 1440) timeLabel = `vor ${Math.round(diffMin / 60)} Std.`;
        else timeLabel = `vor ${Math.round(diffMin / 1440)} Tag(en)`;
      }

      // Status Badge
      const badgeColor = busy ? '#ff5050' : '#50c878';
      const badgeBg = busy ? 'rgba(255,80,80,0.12)' : 'rgba(80,200,120,0.12)';
      const badgeBorder = busy ? 'rgba(255,80,80,0.4)' : 'rgba(80,200,120,0.4)';
      const badgeLabel = busy ? 'Beschäftigt' : 'Bereit';
      const dotColor = busy ? '#ff5050' : '#50c878';

      // Modell — nur den letzten Teil nach / anzeigen
      const modelShort = model.includes('/') ? model.split('/').pop() : model;

      return `
        <div style="
          display: flex;
          align-items: center;
          gap: 16px;
          padding: 4px 0;
        ">
          <!-- Emoji / Icon -->
          <div style="
            font-size: 48px;
            line-height: 1;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
          ">${variables.agent_emoji}</div>

          <!-- Rechte Seite -->
          <div style="flex: 1; min-width: 0;">
            <!-- Name + Badge -->
            <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
              <span style="
                font-size: 20px;
                font-weight: 700;
                color: white;
                letter-spacing: 0.5px;
              ">${variables.agent_name}</span>
              <span style="
                display: inline-flex;
                align-items: center;
                gap: 5px;
                background: ${badgeBg};
                border: 1px solid ${badgeBorder};
                border-radius: 20px;
                padding: 2px 10px;
                font-size: 11px;
                font-weight: 600;
                color: ${badgeColor};
              ">
                <span style="
                  width: 6px; height: 6px;
                  border-radius: 50%;
                  background: ${dotColor};
                  display: inline-block;
                "></span>
                ${badgeLabel}
              </span>
            </div>

            <!-- Status + Last Active -->
            <div style="margin-top: 6px; font-size: 12px; color: rgba(255,255,255,0.55);">
              <span>Status: <strong style="color:rgba(255,255,255,0.85)">${badgeLabel}</strong></span>
              &nbsp;·&nbsp;
              <span>Zuletzt Aktiv: <strong style="color:rgba(255,255,255,0.85)">${timeLabel}</strong></span>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <div style="
          height: 1px;
          background: rgba(255,255,255,0.06);
          margin: 14px 0 10px;
        "></div>

        <!-- Footer -->
        <div style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-size: 11px;
          color: rgba(255,255,255,0.35);
        ">
          <span>Agent · ${connected ? modelShort : 'Offline'}</span>
          <span>OpenClaw v1.0</span>
        </div>
      `;
    ]]]

styles:
  card:
    - background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%)"
    - border-radius: 20px
    - padding: 18px 20px 14px
    - box-shadow: 0 4px 24px rgba(0,0,0,0.45)
    - border: 1px solid rgba(255,255,255,0.05)
  custom_fields:
    card_content:
      - width: 100%
