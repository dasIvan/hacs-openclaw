# OpenClaw Status Card
# Requires: custom:button-card (HACS → Frontend)
#
# ──────────────────────────────────────────────
#  SETUP: Trage hier deine Entity-IDs ein
# ──────────────────────────────────────────────
# Die IDs findest du unter:
#   Einstellungen → Geräte & Dienste → OpenClaw → Entitäten

type: custom:button-card
entity: sensor.openclaw_status   # ← ANPASSEN

variables:
  entity_model: sensor.openclaw_modell              # ← ANPASSEN
  entity_last_active: sensor.openclaw_zuletzt_aktiv # ← ANPASSEN
  entity_connected: binary_sensor.openclaw_verbunden # ← ANPASSEN
  agent_name: OpenClaw                              # ← Dein Agent-Name
  agent_emoji: "🦞"                                 # ← Emoji für den Bot

show_name: false
show_label: false
show_state: false
show_icon: false

custom_fields:
  card_content: |
    [[[
      const status = entity?.state ?? 'idle';
      const busy = status === 'busy';
      const connected = states[variables.entity_connected]?.state === 'on';
      const model = states[variables.entity_model]?.state ?? '—';

      const raw = states[variables.entity_last_active]?.state;
      let timeLabel = '—';
      if (raw && raw !== 'unavailable' && raw !== 'unknown') {
        const diffMin = Math.round((Date.now() - new Date(raw)) / 60000);
        if (diffMin < 1) timeLabel = 'Gerade eben';
        else if (diffMin < 60) timeLabel = `vor ${diffMin} Min.`;
        else if (diffMin < 1440) timeLabel = `vor ${Math.round(diffMin / 60)} Std.`;
        else timeLabel = `vor ${Math.round(diffMin / 1440)} Tag(en)`;
      }

      const accentColor = busy ? '#ff6b6b' : '#69db7c';
      const accentBg = busy ? 'rgba(255,107,107,0.10)' : 'rgba(105,219,124,0.10)';
      const accentBorder = busy ? 'rgba(255,107,107,0.30)' : 'rgba(105,219,124,0.30)';
      const badgeLabel = busy ? 'Beschäftigt' : 'Bereit';
      const modelShort = model.includes('/') ? model.split('/').pop() : model;

      return `
        <style>
          @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.4); }
          }
        </style>
        <div style="display:flex; align-items:center; gap:14px;">
          <div style="
            width:48px; height:48px; border-radius:14px;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(255,255,255,0.08);
            display:flex; align-items:center; justify-content:center;
            font-size:28px; flex-shrink:0;
          ">${variables.agent_emoji}</div>
          <div style="flex:1; min-width:0; text-align:left;">
            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
              <span style="font-size:17px; font-weight:700; color:rgba(255,255,255,0.95);">
                ${variables.agent_name}
              </span>
              <span style="
                display:inline-flex; align-items:center; gap:5px;
                background:${accentBg}; border:1px solid ${accentBorder};
                border-radius:20px; padding:2px 9px 2px 7px;
                font-size:11px; font-weight:600; color:${accentColor};
              ">
                <span style="
                  width:6px; height:6px; border-radius:50%;
                  background:${accentColor}; display:inline-block;
                  animation:pulse 2s ease-in-out infinite;
                "></span>
                ${badgeLabel}
              </span>
            </div>
            <div style="margin-top:6px; font-size:12px; color:rgba(255,255,255,0.4); text-align:left;">
              <span style="color:rgba(255,255,255,0.65);">${badgeLabel}</span>
              <span style="margin:0 4px;">·</span>
              <span>Zuletzt aktiv ${timeLabel}</span>
            </div>
          </div>
        </div>
        <div style="height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent); margin:14px 0 10px;"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px; color:rgba(255,255,255,0.30);">
          <span style="display:flex; align-items:center; gap:6px;">
            <span style="width:4px; height:4px; border-radius:50%; background:${connected ? accentColor : 'rgba(255,255,255,0.2)'}; display:inline-block;"></span>
            ${connected ? modelShort : 'Offline'}
          </span>
          <span style="font-weight:500; letter-spacing:0.5px;">OpenClaw v1.0</span>
        </div>
      `;
    ]]]

styles:
  grid:
    - grid-template-areas: '"card_content"'
    - grid-template-columns: 1fr
  card:
    - background: "linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%)"
    - border-radius: 20px
    - padding: 16px
    - box-shadow: "0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05)"
    - border: 1px solid rgba(255,255,255,0.06)
  custom_fields:
    card_content:
      - width: 100%
      - justify-self: stretch
      - text-align: left
